site_name: FPGA-SYS
site_url: https://fpga-sys.github.io/
theme:
  name: material
  features:
    - navigation.tabs        # верхнее меню
#    - navigation.sections    # группировка в sidebar
    - navigation.top         # кнопка "наверх"
 #   - navigation.instant         # кнопка "наверх"
    - navigation.prune
    - search.highlight
    - content.code.copy
    - header.autohide

  logo:
    assets/fs-logo-short.png
 # language: ru
  palette:
    primary: red
    scheme: default
plugins:
  - search
  - awesome-pages
  - blogging:
      categories:
        - name: Tutorials
          dirs:
            - tutorials
          size: 2
        - name: Articles
          dirs:
            - articles
          size: 2
      dirs:
        - tutorials
        - articles
        - news
        - ads
      size: 3   # сколько последних показывать
      paging: true
      locale: ru

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js